<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluencyOS — German Language System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">

</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>FluencyOS</h1>
    <span>German Language System</span>
  </div>
  <nav id="nav">
    <div class="nav-item active" data-m="dashboard"><span class="nav-icon">◈</span>Dashboard</div>
    <div class="nav-item" data-m="onboarding"><span class="nav-icon">◎</span>Onboarding</div>
    <div class="nav-item" data-m="vocabulary"><span class="nav-icon">◇</span>Vocabulary</div>
    <div class="nav-item" data-m="grammar"><span class="nav-icon">◆</span>Grammar</div>
    <div class="nav-item" data-m="reading"><span class="nav-icon">◻</span>Reading</div>
    <div class="nav-item" data-m="roleplay"><span class="nav-icon">◈</span>Roleplay</div>
    <div class="nav-item" data-m="settings"><span class="nav-icon">⊙</span>Settings</div>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-footer-label">Current Level</div>
    <div class="level-badge" id="sidebar-level">A2</div>
  </div>
</aside>

<!-- Main content -->
<main class="main" id="main"></main>

<!-- Word tooltip -->
<div id="word-tooltip">
  <div class="tt-word" id="tt-word"></div>
  <div class="tt-pos"  id="tt-pos"></div>
  <div class="text-sm mb-8" id="tt-trans"></div>
  <button class="btn btn-sm" id="tt-add-btn">+ Add to Deck</button>
</div>

<script src="/js/state.js"></script>
<script src="/js/modules/onboarding.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
