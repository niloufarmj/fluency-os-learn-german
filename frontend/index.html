<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluencyOS — German Language System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800;9..144,900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="sidebar-logo-mark">F</span>
    <h1>Fluency<em>OS</em></h1>
  </div>
  <nav id="nav">
    <div class="nav-item active" data-m="dashboard"><span class="nav-icon">📊</span> Dashboard</div>
    <div class="nav-item" data-m="onboarding"><span class="nav-icon">🧭</span> Onboarding</div>
    <div class="nav-item" data-m="vocabulary"><span class="nav-icon">🗂️</span> Vocabulary</div>
    <div class="nav-item" data-m="grammar"><span class="nav-icon">📐</span> Grammar</div>
    <div class="nav-item" data-m="reading"><span class="nav-icon">📖</span> Reading</div>
    <div class="nav-item" data-m="roleplay"><span class="nav-icon">🎭</span> Roleplay</div>
    <div class="nav-item" data-m="settings"><span class="nav-icon">⚙️</span> Settings</div>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-user-avatar" id="sidebar-user-avatar">?</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" id="sidebar-user-name">Guest</div>
        <div class="level-badge" id="sidebar-level">A2</div>
      </div>
    </div>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙 &nbsp;Dark Mode</button>
  </div>
</aside>

<!-- Main content -->
<main class="main" id="main"></main>

<!-- Word tooltip -->
<div id="word-tooltip">
  <div class="tt-word" id="tt-word"></div>
  <div class="tt-pos"  id="tt-pos"></div>
  <div class="text-sm mb-8" id="tt-trans"></div>
  <button class="btn btn-primary btn-sm full-w mt-8" id="tt-add-btn">➕ Add to Deck</button>
</div>

<script src="js/state.js"></script>
<script src="js/modules/onboarding.js"></script>
<script src="js/app.js"></script>

</body>
</html>
